{% extends 'base.html' %}
{% block title %}Квиз{% endblock %}
{% block content %}
<h2>Мини-квиз</h2>
<p>Выберите правильное приветствие для языка: <strong>{{ correct_card.language }}</strong></p>

{% if message %}
    <p class="{{ 'success' if message_type == 'success' else 'error' }}">{{ message }}</p>
{% endif %}

<form method="post" class="stack-form">
    {% for card in cards %}
        <label class="radio-option">
            <input type="radio" name="answer" value="{{ card.id }}" {% if selected == card.id|string %}checked{% endif %}>
            {{ card.greeting }}
        </label>
    {% endfor %}
    <input type="hidden" name="correct" value="{{ correct_card.id }}">
    <button type="submit">Проверить</button>
</form>
<p><a href="{{ url_for('quiz') }}">Следующий вопрос</a></p>
{% endblock %}
