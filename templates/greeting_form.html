{% extends 'base.html' %}

{% block title %}
    {% if mode == 'add' %}Добавить карточку{% else %}Редактировать карточку{% endif %}
{% endblock %}

{% block content %}
<h2>{% if mode == 'add' %}Добавить карточку{% else %}Редактировать карточку{% endif %}</h2>

<form method="post" class="stack-form">
    <label>Язык
        <input type="text" name="language" value="{{ values.language }}">
        {% if errors.language %}<span class="error">{{ errors.language }}</span>{% endif %}
    </label>

    <label>Приветствие
        <input type="text" name="greeting" value="{{ values.greeting }}">
        {% if errors.greeting %}<span class="error">{{ errors.greeting }}</span>{% endif %}
    </label>

    <label>Перевод на русский
        <input type="text" name="translation_ru" value="{{ values.translation_ru }}">
        {% if errors.translation_ru %}<span class="error">{{ errors.translation_ru }}</span>{% endif %}
    </label>

    <label>Комментарий
        <textarea name="note" rows="4">{{ values.note }}</textarea>
        {% if errors.note %}<span class="error">{{ errors.note }}</span>{% endif %}
    </label>

    <button type="submit">Сохранить</button>
</form>
{% endblock %}
